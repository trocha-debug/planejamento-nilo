<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nilo Health — Gerador de Planejamento de Reunião</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#00843D;--green-dark:#005c2b;--green-light:#e8f5ee;--green-mid:#c8e6d4;
  --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-400:#9ca3af;
  --gray-600:#4b5563;--gray-800:#1f2937;--gray-900:#111827;
  --red:#dc2626;--amber:#d97706;
  --radius:10px;--radius-lg:16px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.1);
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f0f4f1;color:var(--gray-900);min-height:100vh;font-size:14px;line-height:1.6}
h1,h2,h3,h4{font-weight:700;line-height:1.3}
input,textarea,select{font-family:inherit;font-size:14px}
button{font-family:inherit;cursor:pointer}
.app{max-width:900px;margin:0 auto;padding:24px 16px 60px}

/* HEADER */
.header{display:flex;align-items:center;gap:16px;margin-bottom:32px}
.logo{width:44px;height:44px;background:var(--green);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:26px;height:26px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.header-text h1{font-size:20px;color:var(--gray-900)}
.header-text p{font-size:13px;color:var(--gray-600);margin-top:2px}

/* PROGRESS */
.progress-bar{display:flex;gap:0;margin-bottom:32px;border-radius:var(--radius);overflow:hidden;background:var(--gray-200);height:6px}
.progress-fill{height:6px;background:var(--green);transition:width .4s ease;border-radius:var(--radius)}

/* STEPS NAV */
.steps-nav{display:flex;gap:6px;margin-bottom:28px;flex-wrap:wrap}
.step-pill{padding:6px 14px;border-radius:20px;border:1.5px solid var(--gray-200);background:#fff;font-size:12px;font-weight:600;color:var(--gray-400);cursor:pointer;transition:all .2s;white-space:nowrap}
.step-pill.active{border-color:var(--green);background:var(--green-light);color:var(--green)}
.step-pill.done{border-color:var(--green-mid);background:#fff;color:var(--green);opacity:.7}
.step-pill:disabled{cursor:default}

/* CARD */
.card{background:#fff;border-radius:var(--radius-lg);border:1px solid var(--gray-200);padding:24px;margin-bottom:20px;box-shadow:var(--shadow)}
.card-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.card-icon{width:36px;height:36px;border-radius:10px;background:var(--green-light);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-icon svg{width:18px;height:18px;stroke:var(--green);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.card-title{font-size:15px;font-weight:700;color:var(--gray-900)}
.card-subtitle{font-size:12px;color:var(--gray-600);margin-top:2px}

/* FORM */
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:var(--radius);background:#fff;color:var(--gray-900);outline:none;transition:border .2s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--green)}
.field textarea{resize:vertical;min-height:80px;line-height:1.6}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-hint{font-size:11px;color:var(--gray-400);margin-top:4px}
.field input::placeholder,.field textarea::placeholder{color:var(--gray-400)}

/* TOGGLE GROUP */
.toggle-group{display:flex;flex-wrap:wrap;gap:8px}
.toggle-item{padding:7px 14px;border-radius:20px;border:1.5px solid var(--gray-200);background:#fff;font-size:12px;font-weight:500;color:var(--gray-600);cursor:pointer;transition:all .2s;user-select:none}
.toggle-item.selected{border-color:var(--green);background:var(--green-light);color:var(--green)}

/* SPICED QUESTIONS */
.spiced-block{border:1px solid var(--gray-200);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.spiced-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--gray-50);cursor:pointer;user-select:none}
.spiced-letter{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.spiced-info{flex:1}
.spiced-info strong{font-size:13px;display:block;color:var(--gray-900)}
.spiced-info span{font-size:11px;color:var(--gray-600)}
.spiced-toggle{font-size:18px;color:var(--gray-400);transition:transform .2s}
.spiced-body{padding:16px;border-top:1px solid var(--gray-200);display:none}
.spiced-block.open .spiced-body{display:block}
.spiced-block.open .spiced-toggle{transform:rotate(180deg)}
.question-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--gray-100)}
.question-item:last-child{border-bottom:none}
.question-check{width:18px;height:18px;border:1.5px solid var(--gray-300);border-radius:5px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .2s}
.question-check.checked{background:var(--green);border-color:var(--green)}
.question-check svg{width:10px;height:10px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.question-text{font-size:13px;color:var(--gray-800);flex:1;line-height:1.5}
.add-question{margin-top:10px;display:flex;gap:8px}
.add-question input{flex:1;padding:8px 10px;border:1.5px dashed var(--gray-200);border-radius:var(--radius);font-size:13px;background:var(--gray-50)}
.add-question input:focus{border-color:var(--green);background:#fff;outline:none}
.add-question button{padding:8px 14px;background:var(--green-light);border:1.5px solid var(--green-mid);border-radius:var(--radius);font-size:12px;font-weight:600;color:var(--green)}
.add-question button:hover{background:var(--green-mid)}

/* PREVIEW */
.preview-section{margin-bottom:20px}
.preview-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400);margin-bottom:10px}
.preview-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:var(--green-light);border:1px solid var(--green-mid);border-radius:20px;font-size:12px;font-weight:600;color:var(--green);margin:3px}
.preview-chip svg{width:12px;height:12px;stroke:var(--green);fill:none;stroke-width:2.5}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:var(--radius);font-size:14px;font-weight:600;border:none;transition:all .2s;text-decoration:none}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:hover{background:var(--green-dark)}
.btn-secondary{background:#fff;color:var(--gray-800);border:1.5px solid var(--gray-200)}
.btn-secondary:hover{background:var(--gray-50);border-color:var(--gray-400)}
.btn-ghost{background:transparent;color:var(--gray-600)}
.btn-ghost:hover{background:var(--gray-100)}
.btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.btn-xl{padding:14px 28px;font-size:15px;border-radius:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* NAV FOOTER */
.nav-footer{display:flex;justify-content:space-between;align-items:center;padding-top:20px;margin-top:4px}

/* GENERATE PAGE */
.generate-card{text-align:center;padding:40px 24px}
.generate-icon{width:72px;height:72px;background:var(--green-light);border-radius:20px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center}
.generate-icon svg{width:36px;height:36px;stroke:var(--green);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.generate-card h2{font-size:20px;color:var(--gray-900);margin-bottom:8px}
.generate-card p{font-size:14px;color:var(--gray-600);max-width:440px;margin:0 auto 28px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px;text-align:left}
.summary-item{background:var(--gray-50);border:1px solid var(--gray-100);border-radius:var(--radius);padding:12px 14px}
.summary-item strong{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--gray-400);display:block;margin-bottom:3px}
.summary-item span{font-size:13px;color:var(--gray-900);font-weight:500}
.loading-dots span{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin:0 3px;animation:bounce .8s infinite}
.loading-dots span:nth-child(2){animation-delay:.15s}
.loading-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}

/* SECTION DIVIDER */
.section-divider{height:1px;background:var(--gray-100);margin:20px 0}

/* TOOLTIP */
.info-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--gray-100);border-radius:20px;font-size:11px;color:var(--gray-600)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useRef } = React;

const STEPS = [
  { id: 'interlocutor', label: 'Interlocutor' },
  { id: 'cooperativa', label: 'Cooperativa' },
  { id: 'momento', label: 'Contexto' },
  { id: 'spiced', label: 'SPICED' },
  { id: 'gerar', label: 'Gerar' },
];

const SPICED_META = [
  { key: 'S', label: 'Situation', desc: 'Entender o contexto atual', color: '#0369a1', bg: '#e0f2fe' },
  { key: 'P', label: 'Pain', desc: 'Identificar as dores reais', color: '#7c3aed', bg: '#ede9fe' },
  { key: 'I', label: 'Impact', desc: 'Dimensionar o custo das dores', color: '#0f766e', bg: '#ccfbf1' },
  { key: 'C', label: 'Critical Event', desc: 'Descobrir urgências e prazos', color: '#b45309', bg: '#fef3c7' },
  { key: 'E', label: 'Economic Buyer', desc: 'Identificar quem decide', color: '#be123c', bg: '#ffe4e6' },
  { key: 'D', label: 'Decision Criteria', desc: 'O que importa para aprovar', color: '#166534', bg: '#dcfce7' },
];

const DEFAULT_QUESTIONS = {
  S: [
    'Como está organizada a área de provimento de saúde hoje — quais programas vocês operam diretamente?',
    'Vocês têm alguma plataforma ou ferramenta para monitorar a jornada do paciente entre os pontos de cuidado?',
    'Como é feita a comunicação e engajamento com os beneficiários fora do momento da consulta ou internação?',
  ],
  P: [
    'Quais são os maiores desafios na adesão dos beneficiários aos programas preventivos?',
    'Quando um paciente tem alta do hospital ou do PA, como garantem a continuidade do tratamento?',
    'Do ponto de vista de resultados assistenciais — IDSS, indicadores ANS — quais ainda estão abaixo do esperado?',
  ],
  I: [
    'Quando um beneficiário abandona um programa de crônicos, qual é o impacto assistencial e financeiro percebido?',
    'Já calcularam o custo de uma readmissão hospitalar evitável ou internação não planejada?',
    'Como a baixa adesão aos programas afeta a avaliação da cooperativa perante a ANS ou no IDSS?',
  ],
  C: [
    'Existe alguma meta ou prazo — ANS, meta interna, planejamento estratégico — que torna essa pauta urgente agora?',
    'Há alguma avaliação externa, auditoria ou renovação de certificação que pressiona esse tema em breve?',
    'Existe algum projeto ou contratação em andamento que poderia ser acelerado com uma solução de engajamento?',
  ],
  E: [
    'Em iniciativas como essa — engajamento de beneficiários e gestão de cuidado — quem costuma ser o sponsor da decisão?',
    'Como funciona o processo de avaliação e aprovação de novas tecnologias ou parceiros na cooperativa?',
    'Você costuma envolver equipes clínicas ou de TI desde o início nesse tipo de avaliação?',
  ],
  D: [
    'Quais seriam os critérios mais importantes para avaliar uma solução — resultado clínico, facilidade de implementação, custo, integração?',
    'Já tiveram alguma experiência anterior com plataformas de gestão de saúde populacional? O que funcionou ou não?',
    'Existe alguma exigência técnica — integração com sistemas existentes, LGPD — que qualquer solução precisaria atender?',
  ],
};

const PROGRAMAS_OPTIONS = [
  'Doentes crônicos (diabetes, hipertensão, DPOC)',
  'Livre do Tabaco',
  'Materno-infantil / Gestantes',
  'Atividade Física / Academia',
  'Grupos Educativos',
  'Atendimento Domiciliar (DOM)',
  'Oncologia',
  'Saúde Mental',
  'Obesidade / Emagrecimento',
  'Renal Crônico',
];

const IconDoc = () => <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>;
const IconUser = () => <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
const IconBuilding = () => <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
const IconStar = () => <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
const IconCheck = () => <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>;
const IconChevron = () => <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>;
const IconDownload = () => <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
const IconArrow = () => <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;
const IconBack = () => <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>;
const IconPlus = () => <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
const IconTrash = () => <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>;

function App() {
  const [step, setStep] = useState(0);
  const [generating, setGenerating] = useState(false);
  const [done, setDone] = useState(false);

  const [form, setForm] = useState({
    // Interlocutor
    nome: 'Hericson Caprioli',
    cargo: 'Superintendente de Provimento de Saúde',
    email: '',
    linkedin: '',
    formacao: 'Mestre em Gestão de Cooperativas — PUC-PR',
    perfil: 'Perfil analítico, focado em continuidade assistencial, segurança do paciente e decisões orientadas por dados. Carreira longa dentro da Unimed Londrina, desde operação até gestão estratégica.',
    // Cooperativa
    cooperativa: 'Unimed Londrina',
    estado: 'PR',
    beneficiarios: '170 mil',
    medicos: '1.200',
    municipios: '28',
    programas: ['Doentes crônicos (diabetes, hipertensão, DPOC)', 'Livre do Tabaco', 'Materno-infantil / Gestantes', 'Atividade Física / Academia', 'Atendimento Domiciliar (DOM)'],
    // Contexto
    momento: 'Inauguração do primeiro hospital próprio (set/2025, R$260 mi). Descredenciamento do Hospital Evangélico (dez/2025), absorção de +100 internamentos/dia. Nota máxima IDSS e Selo Ouro RN 507 da ANS.',
    dores: 'Engajamento de beneficiários nos programas preventivos, navegação e continuidade pós-alta, pressão regulatória crescente, absorção de fluxo assistencial.',
    // SPICED questions (by key, array of {text, active})
    questions: Object.fromEntries(
      Object.entries(DEFAULT_QUESTIONS).map(([k, qs]) => [k, qs.map(q => ({ text: q, active: true }))])
    ),
    // BDR
    bdr: 'Tayná',
  });

  const update = (field, value) => setForm(f => ({ ...f, [field]: value }));

  const togglePrograma = (p) => {
    const cur = form.programas;
    if (cur.includes(p)) update('programas', cur.filter(x => x !== p));
    else update('programas', [...cur, p]);
  };

  const progress = ((step) / (STEPS.length - 1)) * 100;

  const canGoNext = () => {
    if (step === 0) return form.nome.trim() && form.cargo.trim();
    if (step === 1) return form.cooperativa.trim();
    return true;
  };

  return (
    <div className="app">
      <div className="header">
        <div className="logo">
          <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </div>
        <div className="header-text">
          <h1>Gerador de Planejamento de Reunião</h1>
          <p>Nilo Health · Sales Intelligence Tool</p>
        </div>
      </div>

      <div className="progress-bar">
        <div className="progress-fill" style={{ width: `${progress}%` }} />
      </div>

      <div className="steps-nav">
        {STEPS.map((s, i) => (
          <button key={s.id}
            className={`step-pill ${i === step ? 'active' : i < step ? 'done' : ''}`}
            onClick={() => i <= step && setStep(i)}
            disabled={i > step}>
            {i < step && '✓ '}{s.label}
          </button>
        ))}
      </div>

      {step === 0 && <StepInterlocutor form={form} update={update} />}
      {step === 1 && <StepCooperativa form={form} update={update} togglePrograma={togglePrograma} />}
      {step === 2 && <StepContexto form={form} update={update} />}
      {step === 3 && <StepSpiced form={form} update={update} />}
      {step === 4 && <StepGerar form={form} generating={generating} done={done} setGenerating={setGenerating} setDone={setDone} />}

      {step < 4 && (
        <div className="nav-footer">
          <button className="btn btn-ghost" onClick={() => setStep(s => s - 1)} disabled={step === 0}>
            <IconBack /> Anterior
          </button>
          <button className="btn btn-primary" onClick={() => setStep(s => s + 1)} disabled={!canGoNext()}>
            {step === 3 ? 'Revisar e Gerar' : 'Próximo'} <IconArrow />
          </button>
        </div>
      )}
    </div>
  );
}

function StepInterlocutor({ form, update }) {
  return (
    <div>
      <div className="card">
        <div className="card-header">
          <div className="card-icon"><IconUser /></div>
          <div>
            <div className="card-title">Dados do Interlocutor</div>
            <div className="card-subtitle">Quem você vai encontrar</div>
          </div>
        </div>
        <div className="field-row">
          <div className="field">
            <label>Nome completo *</label>
            <input value={form.nome} onChange={e => update('nome', e.target.value)} placeholder="Ex: Hericson Caprioli" />
          </div>
          <div className="field">
            <label>Cargo *</label>
            <input value={form.cargo} onChange={e => update('cargo', e.target.value)} placeholder="Ex: Superintendente de Provimento" />
          </div>
        </div>
        <div className="field-row">
          <div className="field">
            <label>E-mail (opcional)</label>
            <input value={form.email} onChange={e => update('email', e.target.value)} placeholder="nome@unimed.coop.br" />
          </div>
          <div className="field">
            <label>LinkedIn (opcional)</label>
            <input value={form.linkedin} onChange={e => update('linkedin', e.target.value)} placeholder="linkedin.com/in/..." />
          </div>
        </div>
        <div className="field">
          <label>Formação / Background</label>
          <input value={form.formacao} onChange={e => update('formacao', e.target.value)} placeholder="Ex: MBA em Gestão de Saúde — FGV" />
        </div>
        <div className="field">
          <label>Leitura de perfil</label>
          <textarea value={form.perfil} onChange={e => update('perfil', e.target.value)} rows={3} placeholder="Como você descreve o perfil desse interlocutor? Analítico, comercial, técnico, operacional..." />
          <div className="field-hint">Isso guia o tom do documento e a abertura da reunião.</div>
        </div>
      </div>
      <div className="card">
        <div className="field">
          <label>Responsável Nilo (BDR/AE)</label>
          <input value={form.bdr} onChange={e => update('bdr', e.target.value)} placeholder="Seu nome" />
        </div>
      </div>
    </div>
  );
}

function StepCooperativa({ form, update, togglePrograma }) {
  return (
    <div>
      <div className="card">
        <div className="card-header">
          <div className="card-icon"><IconBuilding /></div>
          <div>
            <div className="card-title">Dados da Cooperativa</div>
            <div className="card-subtitle">Informações gerais da Unimed</div>
          </div>
        </div>
        <div className="field-row">
          <div className="field">
            <label>Nome da cooperativa *</label>
            <input value={form.cooperativa} onChange={e => update('cooperativa', e.target.value)} placeholder="Ex: Unimed Londrina" />
          </div>
          <div className="field">
            <label>Estado (UF)</label>

function SpicedBlock({ meta, questions, updateQuestions }) {
  const [open, setOpen] = useState(meta.key === 'S' || meta.key === 'P');
  const [newQ, setNewQ] = useState('');

  const toggle = (i) => {
    const updated = questions.map((q, idx) => idx === i ? { ...q, active: !q.active } : q);
    updateQuestions(updated);
  };
  const remove = (i) => updateQuestions(questions.filter((_, idx) => idx !== i));
  const add = () => {
    if (newQ.trim()) {
      updateQuestions([...questions, { text: newQ.trim(), active: true }]);
      setNewQ('');
    }
  };

  const activeCount = questions.filter(q => q.active).length;

  return (
    <div className={`spiced-block ${open ? 'open' : ''}`}>
      <div className="spiced-header" onClick={() => setOpen(o => !o)}>
        <div className="spiced-letter" style={{ background: meta.bg, color: meta.color }}>{meta.key}</div>
        <div className="spiced-info">
          <strong>{meta.key} — {meta.label}</strong>
          <span>{meta.desc} · <b>{activeCount}</b> pergunta{activeCount !== 1 ? 's' : ''} ativa{activeCount !== 1 ? 's' : ''}</span>
        </div>
        <div className="spiced-toggle"><IconChevron /></div>
      </div>
      <div className="spiced-body">
        {questions.map((q, i) => (
          <div key={i} className="question-item">
            <div className={`question-check ${q.active ? 'checked' : ''}`} onClick={() => toggle(i)}>
              {q.active && <IconCheck />}
            </div>
            <div className="question-text" style={{ opacity: q.active ? 1 : .45 }}>{q.text}</div>
            <button onClick={() => remove(i)} style={{ background: 'none', border: 'none', padding: '2px 6px', color: '#ccc', cursor: 'pointer' }}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            </button>
          </div>
        ))}
        <div className="add-question">
          <input value={newQ} onChange={e => setNewQ(e.target.value)} onKeyDown={e => e.key === 'Enter' && add()} placeholder="Adicionar pergunta personalizada..." />
          <button onClick={add}><IconPlus /> Adicionar</button>
        </div>
      </div>
    </div>
  );
}

function StepGerar({ form, generating, done, setGenerating, setDone }) {
  const totalQ = Object.values(form.questions).flat().filter(q => q.active).length;

  const gerarDocumento = async () => {

    try {
      await buildDocx(form);
      setDone(true);
    } catch(e) {
      console.error(e);
      alert('Erro ao gerar documento: ' + e.message);

  return (
    <div className="card generate-card">

      <div className="summary-grid">

          <span>{form.cargo}</span>

        <div className="summary-item">

          <span>{form.cooperativa} — {form.estado}</span>
        </div>
        <div className="summary-item">
          <strong>Beneficiários</strong>
          <span>{form.beneficiarios}</span>
        </div>
        <div className="summary-item">
          <strong>Programas mapeados</strong>
          <span>{form.programas.length} programa{form.programas.length !== 1 ? 's' : ''}</span>
        </div>
        <div className="summary-item">
          <strong>Perguntas SPICED</strong>
          <span>{totalQ} ativas no roteiro</span>

      </div>

      {generating
        ? <div style={{ marginBottom: 24 }}><div className="loading-dots"><span/><span/><span/></div><p style={{ marginTop: 12, fontSize: 13, color: '#6b7280' }}>Montando documento...</p></div>

  );

        Para("Esta é uma reunião de discovery. O objetivo principal não é apresentar, mas ouvir e diagnosticar."),
        BR(),
        TwoCol(
          [
            new D.Paragraph({ children: [new D.TextRun({ text: "Objetivo para a Nilo", bold: true, size: 20, font: "Arial", color: GREEN })] }),
            new D.Paragraph({ spacing:{before:60}, children: [new D.TextRun({ text: "✓ Mapear dores operacionais e estratégicas", size: 19, font: "Arial", color: BLACK })] }),
            new D.Paragraph({ children: [new D.TextRun({ text: "✓ Entender gestão de engajamento e adesão", size: 19, font: "Arial", color: BLACK })] }),
            new D.Paragraph({ children: [new D.TextRun({ text: "✓ Identificar gaps na jornada do beneficiário", size: 19, font: "Arial", color: BLACK })] }),
            new D.Paragraph({ children: [new D.TextRun({ text: "✓ Qualificar a oportunidade com SPICED", size: 19, font: "Arial", color: BLACK })] }),

            new D.Paragraph({ children: [new D.TextRun({ text: "✓ Ao menos 1 dor claramente mapeada", size: 19, font: "Arial", color: BLACK })] }),
            new D.Paragraph({ children: [new D.TextRun({ text: "✓ Próximo passo acordado", size: 19, font: "Arial", color: BLACK })] }),
          ],
          GREEN_LIGHT, GRAY50
        ),
        BR(), BR(),

        // 4. AGENDA
        H1("4. Agenda Proposta — 45 minutos"),
        BR(),
        agendaRow("1", "0–5 min", "Abertura e rapport", "Conexão com a trajetória do interlocutor e contexto atual"),

        // 6. ABERTURA
        H1("6. Sugestão de Abertura"),

          width: { size: 9026, type: D.WidthType.DXA },
          columnWidths: [9026],
          rows: [new D.TableRow({ children: [new D.TableCell({
            borders: allBrd,
            shading: { fill: GRAY50, type: D.ShadingType.CLEAR },
            margins: { top: 160, bottom: 160, left: 200, right: 200 },

            })] })]

          children: [new D.TextRun({
            text: `Documento interno — Nilo Health  |  Responsável: ${form.bdr}  |  ${form.cooperativa} × ${form.nome}`,

          })]

      ]
    }]
  });

  const buffer = await D.Packer.toBuffer(doc);
  const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const safeName = form.cooperativa.toLowerCase().replace(/\s+/g, '_');
  a.download = `planejamento_reuniao_${safeName}.docx`;
  a.click();
  URL.revokeObjectURL(url);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
